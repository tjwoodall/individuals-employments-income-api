  /individuals/employments-income/{nino}/{taxYear}/{employmentId}/financial-details:
    get:
      summary: Retrieve an Employment and its Financial Details
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This endpoint enables you to retrieve employment information and associated financial data for a given tax year.
        A National Insurance number, tax year and Employment ID must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)         | Scenario                                                                                                                                                                                                                                   |
        |------------------------------------------|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|                                                                                      
        | N/A - DEFAULT <br> **?source=user**      | Requesting **user** source simulates success response with User provided financial details.                                                                                                                                                |
        | N/A - DEFAULT <br> **?source=hmrc-held** | Requesting **hmrc-held** source simulates success response with HMRC held financial details.                                                                                                                                               |
        | N/A - DEFAULT <br> **?source=latest**    | Requesting **latest** source simulates success response with Latest financial details submitted.                                                                                                                                           |
        | NOT_FOUND                                | Simulates the scenario where no data is found.                                                                                                                                                                                             |
        | STATEFUL                                 | Performs a stateful retrieve. <p> Information and data held by HMRC is not available in the sandbox environment. Providing ‘source=hmrcHeld’ will result in the expected HTTP 404 (matching resource not found) error being returned. </p> |
        | REQUEST_CANNOT_BE_FULFILLED              | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.                                                                                                              |
      tags:
        - Employments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: employmentId
          in: path
          description: |
            The unique identifier for the employment.
          schema: *ref_16
          required: true
        - in: query
          name: source
          description: |
            Specifies the source of data to be returned. If source is not provided,
            the latest submitted values will be returned.
          schema: &ref_37
            type: string
            enum:
              - user
              - hmrc-held
              - latest
            example: latest
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_14
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: TY 2022-23 and before
                    description: Retrieve an Employment and its Financial Details Response
                    type: object
                    properties:
                      submittedOn:
                        type: string
                        description: The date the Employment data was added. Must conform to the format YYYY-MM-DDThh:mm:ss.SSSZ
                        example: '2020-07-06T09:37:23.542Z'
                      source:
                        type: string
                        description: Specifies the source of data to be returned. If source is not provided, the latest submitted values will be returned.
                        enum: &ref_32
                          - hmrc-held
                          - user
                          - latest
                      customerAdded:
                        type: string
                        description: The date the employment data was added by the customer. Must conform to the format YYYY-MM-DDThh:mm:ss.SSSZ
                        example: '2020-07-06T09:37:23.542Z'
                      dateIgnored:
                        type: string
                        description: The date the employment was ignored. Must conform to the format YYYY-MM-DDThh:mm:ss.SSSZ
                        example: '2020-07-06T09:37:23.542Z'
                      employment:
                        type: object
                        description: Object containing the financial data relating to a single employment.
                        properties:
                          employmentSequenceNumber:
                            type: string
                            description: A number that identifies the position of the employment in a sequence of employments for a given tax year.
                            example: '1'
                            pattern: ^[1-9][0-9]{0,9}$
                          payrollId:
                            type: string
                            description: A unique identifier used by the employer to identify the employee.
                            example: '124214112412'
                            pattern: ^[A-Za-z0-9.,\-()/=!"%&*;<>'+:\?]{0,38}$
                          companyDirector:
                            type: boolean
                            description: Identifies the employee as a director when set to True. This field will not be applicable for tax years 2025-26 onwards.
                            example: 'false'
                          closeCompany:
                            type: boolean
                            description: Identifies if the employer is a close company. This field will not be applicable for tax years 2025-26 onwards.
                            example: 'false'
                          directorshipCeasedDate:
                            type: string
                            description: The date the directorship ended. This field will not be applicable for tax years 2025-26 onwards. Must conform to the format YYYY-MM-DD
                            example: '2020-07-01'
                          startDate:
                            type: string
                            description: The date the employment began. Must conform to the format YYYY-MM-DD
                            example: '2020-07-01'
                          cessationDate:
                            type: string
                            description: The date the employment ended. Must conform to the format YYYY-MM-DD
                            example: '2020-07-01'
                          occupationalPension:
                            type: boolean
                            description: Indicates that the employee pays into an occupational pension when set to True.
                            example: 'false'
                          disguisedRemuneration:
                            type: boolean
                            description: Indicates that the employee is declaring disguised remuneration when set to True.
                            example: 'false'
                          employer:
                            type: object
                            description: Object containing pay details for a single employment.
                            properties:
                              employerRef:
                                type: string
                                description: A unique identifier, the employer reference number.
                                example: 123/AB56797
                                pattern: ^[0-9]{3}\/[^ ].{0,9}$
                              employerName:
                                type: string
                                description: The name of the employer the employee worked for.
                                example: Employer Name Ltd.
                                pattern: ^\S.{0,73}$
                            required:
                              - employerName
                          pay:
                            type: object
                            description: Object containing pay details for a single employment.
                            properties:
                              taxablePayToDate:
                                type: number
                                description: The gross pay for this employment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              totalTaxToDate:
                                type: number
                                description: The amount of tax deducted for this employment. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: -99999999999.99
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              payFrequency:
                                type: string
                                description: The payment frequency
                                example: fortnightly
                                enum:
                                  - weekly
                                  - fortnightly
                                  - four-weekly
                                  - monthly
                                  - quarterly
                                  - bi-annually
                                  - one-off
                                  - irregular
                                  - annually
                              paymentDate:
                                type: string
                                description: The date of the latest payment. Must conform to the format YYYY-MM-DD
                                example: '2020-07-01'
                              taxWeekNo:
                                type: number
                                description: The week count of the tax year. The value must be an integer between 1 and 56
                                example: '32'
                                minimum: 1
                                maximum: 56
                                multipleOf: 1
                              taxMonthNo:
                                type: number
                                description: The month count of the tax year. The value must be an integer between 1 and 12
                                example: '7'
                                minimum: 1
                                maximum: 12
                                multipleOf: 1
                          customerEstimatedPay:
                            type: object
                            description: Object containing estimated pay details for a single employment.
                            properties:
                              amount:
                                type: number
                                description: The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1500.99'
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                          deductions:
                            type: object
                            description: Object containing details of deductions for a single employment.
                            properties: &ref_33
                              studentLoans:
                                type: object
                                description: Object containing details of deductions against student loans.
                                properties:
                                  uglDeductionAmount:
                                    type: number
                                    description: The amount deducted for an undergraduate student loan. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                    example: '1024.99'
                                    minimum: 0
                                    'maximum:': 99999999999.99
                                    multipleOf: 0.01
                                  pglDeductionAmount:
                                    type: number
                                    description: The amount deducted for a postgraduate student loan. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                    example: '1024.99'
                                    minimum: 0
                                    'maximum:': 99999999999.99
                                    multipleOf: 0.01
                          benefitsInKind:
                            type: object
                            description: Object containing amount values of benefits received from a single employment.
                            properties: &ref_34
                              accommodation:
                                type: number
                                description: The value of accommodation costs provided by the employer. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              assets:
                                type: number
                                description: The value of any goods provided by the employer not exclusively used for work. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              assetTransfer:
                                type: number
                                description: The value of any company assets signed over by the employer. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              beneficialLoan:
                                type: number
                                description: The amount of interest free or low interest loans given by the employer. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              car:
                                type: number
                                description: The cash equivalent of any cars made available by the employer. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              carFuel:
                                type: number
