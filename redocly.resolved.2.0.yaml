                                example: '1024.99'
                                minimum: 0
                                'maximum:': 99999999999.99
                                multipleOf: 0.01
                              taxableExpenses:
                                type: number
                                description: Taxable expenses reimbursed by the employer to the employee. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                example: '1024.99'
