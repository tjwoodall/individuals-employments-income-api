openapi: 3.0.3
info:
  version: '2.0'
  title: Individuals Employments Income (MTD)
  description: |
    The following groups of endpoints are stateful in the Sandbox:
      * [Non-PAYE Employment Income](#tag/Non-PAYE-Employment-Income)
      * [Other Employment Income](#tag/Other-Employment-Income)
      * [Student Loan Benefits in Kind](#tag/Student-Loan-Benefits-in-Kind)

    The following endpoints are stateful in the Sandbox:
      * List Employments
      * Add a Custom Employment
      * Retrieve an Employment
      * Amend a Custom Employment
      * Delete a Custom Employment
      * Retrieve an Employment and its Financial Details
      * Create and Amend Employment Financial Details
      * Delete Employment Financial Details
      * Create or Amend Student Loan Benefits in Kind
      * Retreive Student Loan Benefits in Kind
      * Delete Student Loan Benefits in Kind

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Employments
    description: Resources relating to an individual's employments (please note, an occupational pension is classed as employment income and is identified by the occupationalPension property)
  - name: Non-PAYE Employment Income
    description: These endpoints allow a user to create, amend, retrieve and delete Non-PAYE employment income and tips
  - name: Other Employment Income
    description: Resources relating to an individual's other employment income
  - name: Student Loan Benefits in Kind
    description: This endpoint allows you to create, amend, retrieve and delete information on Student Loan Benefits in Kind (BIK)
paths:
  /individuals/employments-income/{nino}/{taxYear}:
    get:
      summary: List Employments
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This endpoint allows a developer to list the employments for this user.
        A National Insurance number and Tax year must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        |----------------------------------|------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response.                    |
        | NOT_FOUND                        | Simulates the scenario where no data is found. |
        | STATEFUL                         | Performs a stateful list.                      |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
      tags:
        - Employments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: &ref_4
            type: string
            example: 2021-22
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_14
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_6
            type: string
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Employment Response
                description: Retrieve Employment Response
                type: object
                properties:
                  employments:
                    type: array
                    items:
                      type: object
                      description: Array containing details of employments provided to HMRC by employers.
                      properties:
                        employmentId:
                          type: string
                          description: The unique identifier for the employment.
                          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
                          example: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
                        employerName:
                          type: string
                          description: The name of the employer the employee worked for.
                          pattern: ^\S.{0,73}$
                          example: Employer Name Ltd.
                        dateIgnored:
                          type: string
                          description: The date the HMRC provided employment instance was set to be ignored. It must be provided in the format YYYY-MM-DDThh:mm:ss.SSSZ
                          example: '2021-04-06T09:37:17.542Z'
                      required:
                        - employmentId
                        - employerName
                  customEmployments:
                    type: array
                    items:
                      type: object
                      description: Array containing details of employments provided by the user.
                      properties:
                        employmentId:
                          type: string
                          description: The unique identifier for the employment.
                          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
                          example: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
                        employerName:
                          type: string
                          description: The name of the employer the employee worked for.
                          pattern: ^\S.{0,73}$
                          example: Employer Name Ltd.
                      required:
                        - employmentId
                        - employerName
              examples:
                example-response:
                  description: Example Response
                  value:
                    employments:
                      - employmentId: 1557ecb5-fd32-48cc-81f5-e6acd1099f1c
                        employerName: Employer Name Ltd.
                        dateIgnored: '2020-06-17T10:53:38.000Z'
                    customEmployments:
                      - employmentId: 2557ecb5-fd32-48cc-81f5-e6acd1099f2c
                        employerName: Employer Name Ltd.
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: &ref_7
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: &ref_8
                    code: FORMAT_TAX_YEAR
                    message: The provided tax year is invalid
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: &ref_10
                    code: RULE_TAX_YEAR_NOT_SUPPORTED
                    message: The tax year specified does not lie within the supported range
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: &ref_9
                    code: RULE_TAX_YEAR_RANGE_INVALID
                    message: Tax year range invalid. A tax year range of one year is required
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_11
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: &ref_12
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: The client and/or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: &ref_15
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: &ref_13
                    code: RULE_REQUEST_CANNOT_BE_FULFILLED
                    message: Custom (will vary in production depending on the actual error)
    post:
      summary: Add a Custom Employment
      security:
        - User-Restricted:
            - write:self-assessment
      description: |
        This endpoint allows the developer to add an employment missing from the list of employments for this user.
        <strong>This endpoint can only be used after the tax year has ended.</strong>
        Employments that are added via this method are not rolled over into the next tax year.
        A National Insurance number, tax year, employer name and start date are required.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                     |
        |----------------------------------|------------------------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response.                                                                                                  |
        | STATEFUL                         | Performs a stateful create.                                                                                                  |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                              |
      tags:
        - Employments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_17
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_18
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Add Custom Employment Request
              description: Add Custom Employment Request
              type: object
              properties:
                employerRef:
                  type: string
                  description: A unique identifier, the employer reference number.
                  pattern: ^[0-9]{3}\/[^ ].{0,9}$
                  example: 123/AB56797
                employerName:
                  type: string
                  description: The name of the employer the employee worked for.
                  pattern: ^\S.{0,73}$
                  example: Employer Name Ltd.
                startDate:
                  type: string
                  description: The date the employment began. It must be provided in the format YYYY-MM-DD
                  example: '2020-07-01'
                cessationDate:
                  type: string
                  description: The date the employment ended. It must be provided in the format YYYY-MM-DD
                  example: '2020-07-01'
                payrollId:
                  type: string
                  description: The unique identifier used by the employer to identify the employee. Up to 38 characters are supported, but only the first 35 will be retained during submission.
                  pattern: ^[A-Za-z0-9 \.,\-\(\)/=!\"%&\*;<>'\+:\?#]{0,38}$
                  example: YDIAHPcYFQbOXLCKQ
                occupationalPension:
                  type: boolean
                  description: A boolean indicating whether this income is from an occupational pension. The value must be true or false.
                  example: 'true'
              required:
                - employerName
                - startDate
                - occupationalPension
            examples:
              default-example:
                description: Default Example
                value:
                  employerRef: 123/AB56797
                  employerName: Employer Name Ltd.
                  startDate: '2019-01-01'
                  cessationDate: '2020-06-01'
                  payrollId: YDIAHPcYFQbOXLCKQ
                  occupationalPension: false
              occupational-pension-example:
                description: Example With Occupational Pension
                value:
                  employerRef: 123/AB56797
                  employerName: Employer Name Ltd.
                  startDate: '2019-01-01'
                  cessationDate: '2020-06-01'
                  payrollId: YDIAHPcYFQbOXLCKQ
                  occupationalPension: true
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Add Custom Employment Response
                description: Add Custom Employment Response
                type: object
                properties:
                  employmentId:
                    type: string
                    description: The unique identifier for the employment.
                    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
                    example: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
                required:
                  - employmentId
              examples:
                example-response:
                  description: Example Response
                  value:
                    employmentId: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: *ref_7
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: *ref_8
                FORMAT_EMPLOYER_REF:
                  description: The format of the supplied employer ref is not valid.
                  value: &ref_20
                    code: FORMAT_EMPLOYER_REF
                    message: The provided employer ref is invalid
                FORMAT_EMPLOYER_NAME:
                  description: The format of the employer name is not valid.
                  value: &ref_21
                    code: FORMAT_EMPLOYER_NAME
                    message: The provided employer name is invalid
                FORMAT_START_DATE:
                  description: The format of the supplied start date field is not valid.
                  value: &ref_22
                    code: FORMAT_START_DATE
                    message: The provided start date is invalid
                FORMAT_CESSATION_DATE:
                  description: The format of the supplied cessation date is not valid.
                  value: &ref_23
                    code: FORMAT_CESSATION_DATE
                    message: The provided cessation date is invalid
                FORMAT_PAYROLL_ID:
                  description: The format of the supplied payroll ID field is not valid.
                  value: &ref_24
                    code: FORMAT_PAYROLL_ID
                    message: The provided payroll ID is invalid
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: *ref_9
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: *ref_10
                RULE_TAX_YEAR_NOT_ENDED:
                  description: The submission has been made before the tax year it relates to has ended.
                  value: &ref_25
                    code: RULE_TAX_YEAR_NOT_ENDED
                    message: Tax year not ended
                RULE_START_DATE_AFTER_TAX_YEAR_END:
                  description: The employment is listed as starting after the tax year ended.
                  value: &ref_26
                    code: RULE_START_DATE_AFTER_TAX_YEAR_END
                    message: The start date cannot be later than the tax year end
                RULE_CESSATION_DATE_BEFORE_TAX_YEAR_START:
                  description: The employment is listed as ending before the tax year began.
                  value: &ref_27
                    code: RULE_CESSATION_DATE_BEFORE_TAX_YEAR_START
                    message: The cessation date cannot be before the tax year starts
                RULE_CESSATION_DATE_BEFORE_START_DATE:
                  description: The cessation date is earlier than the start date.
                  value: &ref_28
                    code: RULE_CESSATION_DATE_BEFORE_START_DATE
                    message: The cessation date cannot be earlier than the start date
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: An empty or non-matching body was submitted.
                  value: &ref_29
                    code: RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED
                    message: An empty or non-matching body was submitted
                RULE_OUTSIDE_AMENDMENT_WINDOW:
                  description: The request cannot be completed as you are outside the amendment window.
                  value: &ref_30
                    code: RULE_OUTSIDE_AMENDMENT_WINDOW
                    message: You are outside the amendment window
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_11
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_12
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: *ref_13
  /individuals/employments-income/{nino}/{taxYear}/{employmentId}:
    get:
      summary: Retrieve an Employment
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This endpoint allows the developer to retrieve details of an employment for this user.
        A National Insurance number, Tax year and Employment ID are required.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                 |
        |----------------------------------|----------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response with custom employment.       |
        | HMRC_EMPLOYMENT                  | Simulates success response with HMRC employment.         |
        | HMRC_IGNORED                     | Simulates success response with ignored HMRC employment. |
        | NOT_FOUND                        | Simulates the scenario where no data is found.           |
        | STATEFUL                         | Performs a stateful retrieve.                            |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
      tags:
        - Employments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: employmentId
          in: path
          description: |
            The unique identifier for the employment.
          schema: &ref_16
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
            example: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_14
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Employment Response
                description: Retrieve Employment Response
                type: object
                properties:
                  employerRef:
                    type: string
                    description: A unique identifier, the employer reference number.
                    pattern: ^[0-9]{3}\/[^ ].{0,9}$
                    example: 123/AB56797
